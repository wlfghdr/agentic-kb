name: Bug report
description: Something in the spec, the reference implementation, or the CI doesn't work as described.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please describe what you expected vs. what happened.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce.
      placeholder: |
        1. Clone the repo at commit <sha>
        2. Run ...
        3. Observe ...

  - type: input
    id: version
    attributes:
      label: Spec version
      description: Contents of the root `VERSION` file you tested against.
      placeholder: "2.0.0"

  - type: input
    id: harness
    attributes:
      label: Harness (if applicable)
      description: VS Code Copilot, Claude Code, OpenCode, or other.

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
