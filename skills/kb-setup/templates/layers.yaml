# Layer configuration for the personal KB.
# All config lives in .kb-config/ — this file is .kb-config/layers.yaml.
# See https://github.com/wlfghdr/agentic-kb/blob/main/docs/REFERENCE.md §5

workspace:
  root: {{WORKSPACE_ROOT}}
  user: {{USER_NAME}}
  aliases: {}

layers:
  personal:
    path: .
    workstreams:
      - name: {{WORKSTREAM_1_NAME}}
        themes: {{WORKSTREAM_1_THEMES}}
      # add more workstreams as needed

  teams:
    # - name: team-x
    #   path: ../team-x-kb
    #   contributor-dir: {{USER_NAME}}

  org-unit:
    # name: my-org-unit
    # path: ../my-org-unit-kb

  marketplace:
    enabled: false
    # repo: <org>/<marketplace-repo>
    # path: ../marketplace

  company:
    enabled: false
    sources: []
