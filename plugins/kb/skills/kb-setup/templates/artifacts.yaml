# HTML artifact styling — used by /kb present and /kb report.

styling:
  source: builtin                       # builtin | website | template
  reference-url: ""                     # if source=website
  reference-file: ""                    # if source=template
  themes: [light, dark]
  default-theme: auto                   # auto | light | dark

watermark:
  enabled: true
  position: intro-slide                 # intro-slide | every-slide
  format: "v{version} · {date}"
  style: subtle                         # subtle | normal

appendix:
  changelog: true
  sources: true
  hidden-by-default: false

output:
  directory: _kb-references/reports
  filename-template: "{slug}-v{version}.html"

# Root index.html generation rules (see references/html-artifacts.md).
# These apply to the index written by `.kb-scripts/generate-index`.
index:
  stale-after-days: 14                  # artifacts older than this get a "stale" badge
  pinned-categories:                    # always rendered first, in this order
    - Journey Maps
    - Roadmap & Status
  dedup-versioned: true                 # collapse -v3, -v4, -v5 etc. to the newest
  drop-referenced-subpages: true        # if a hub HTML links to a leaf HTML, hide the leaf
  category-order: recency               # recency | fixed

github-pages:
  enabled: false
  branch: gh-pages
  index-file: index.html
