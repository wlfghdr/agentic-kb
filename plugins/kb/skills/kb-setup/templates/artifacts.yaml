# HTML artifact styling — used by /kb present and /kb report.

styling:
  source: builtin                       # builtin | website | template
  reference-url: ""                     # if source=website
  reference-file: ""                    # if source=template
  themes: [light, dark]
  default-theme: auto                   # auto | light | dark

watermark:
  enabled: true
  position: intro-slide                 # intro-slide | every-slide
  format: "v{version} · {date}"
  style: subtle                         # subtle | normal

appendix:
  changelog: true
  sources: true
  hidden-by-default: false

output:
  directory: _kb-references/reports
  filename-template: "{slug}-v{version}.html"

# Product-management artifacts. Setup uncomment/renders these when the
# selected owning layer enables `roadmaps` or `journeys`.
# html-template:
#   base: kb-roadmap/templates/roadmap.html.hbs
#   tokens: neutral
#   themes: [light, dark, auto]
# journeys-template:
#   base: kb-journeys/templates/journey.html.hbs
#   tokens: neutral
#   themes: [light, dark, auto]

# Root index.html generation rules (see references/html-artifacts.md).
# These apply to the index written by `.kb-scripts/generate-index`.
index:
  stale-after-days: 14                  # artifacts older than this get a "stale" badge
  pinned-categories:                    # always rendered first, in this order
    - Journey Maps
    - Roadmap & Status
  dedup-versioned: true                 # collapse -v3, -v4, -v5 etc. to the newest
  drop-referenced-subpages: true        # if a hub HTML links to a leaf HTML, hide the leaf
  category-order: recency               # recency | fixed

github-pages:
  enabled: false
  branch: gh-pages
  index-file: index.html

# Brand logo for generated HTML overviews (dashboard.html, index.html).
# Vendor-neutral default is `hexagon`. Adopters with their own brand can
# set `logo: <name>` (built-in: hexagon, none) or supply
# `logo-file: path/to/logo.svg` (inlined into the generated HTML).
brand:
  logo: hexagon                         # hexagon | none
  # logo-file: ""                       # optional path to a .svg file

# Dashboard (command-center) generation — see scripts/generate-dashboard.py.
# The dashboard surfaces live KB state the owner should have in mind:
# focus tasks, pending inputs, active ideas, open decisions, topics,
# recent findings/digests/reports, workstream freshness, and opt-in
# external work-items from GitHub and Jira. Panels with no data are
# skipped automatically. External panels are OFF by default — enable
# per-adopter.
dashboard:
  enabled: true
  panels:
    - focus-tasks
    - backlog
    - pending-inputs
    - active-ideas
    - open-decisions
    - topics
    - recent-findings
    - recent-digests
    - recent-reports
    - workstreams
    # - github                           # opt-in, requires authenticated gh CLI
    # - jira                             # opt-in, requires jira-sync-style markdown export
  limits:
    recent-findings: 5
    recent-digests: 3
    recent-reports: 3
    active-ideas: 8
    open-decisions: 8
    topics: 8
    workstreams: 10
    github: 10
    jira: 10
  external:
    github:
      enabled: false
      query: "assignee:@me is:open"     # gh search issues query
      repos: []                          # optional --repo filters
    jira:
      enabled: false
      source: path                       # path | (future: api, acli)
      path: ""                           # path to jira-sync issues dir
      assignee: ""                       # substring match on frontmatter `assignee`
      status_exclude:                    # drop items in these statuses
        - Done
        - Closed
        - Resolved
        - Cancelled
