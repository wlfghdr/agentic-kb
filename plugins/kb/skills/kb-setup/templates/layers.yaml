# Flexible layer graph for the anchor layer.
# All config lives in .kb-config/ — this file is .kb-config/layers.yaml.
# See https://github.com/wlfghdr/agentic-kb/blob/main/docs/REFERENCE.md §5

workspace:
  root: {{WORKSPACE_ROOT}}
  user: {{USER_NAME}}
  anchor-layer: {{KB_NAME}}
  aliases: {}

layers:
  - name: {{KB_NAME}}
    scope: personal
    role: contributor
    parent: null
    path: .
    features: [inputs, findings, topics, ideas, decisions, tasks, notes, workstreams, foundation, reports]
    workstreams:
      - name: {{WORKSTREAM_1_NAME}}
        themes: {{WORKSTREAM_1_THEMES}}
    marketplace:
      enabled: false
      repo: null
      install-mode: none
    connections:
      product-repos: []
      trackers: []
      reference-mode: link
      writeback:
        enabled: false
        capabilities: []
    # When /kb setup derives product-management artifacts from role/goals,
    # it adds roadmaps/journeys to this layer's features and renders blocks
    # like the examples below under the selected owning layer.
    # roadmap:
    #   ownership:
    #     layer: {{KB_NAME}}
    #     mode: single-layer
    #     rationale: "Setup derived roadmap work from role/goals."
    #   default-scope: {{WORKSTREAM_1_NAME}}
    #   default-timeframe: quarter
    #   output-dir: _kb-roadmaps
    #   scopes:
    #     {{WORKSTREAM_1_NAME}}:
    #       kind: detail
    #       label: {{WORKSTREAM_1_NAME}}
    #   plan-sources: []
    #   delivery-sources: []
    # journeys:
    #   ownership:
    #     layer: {{KB_NAME}}
    #     mode: co-located-with-roadmap
    #     rationale: "Setup co-located journeys with their roadmap scope."
    #   source-dir: _kb-journeys
    #   output-dir: _kb-journeys
    #   html-subdir: html
    #   mocks-subdir: html/mocks

  # Add more layers as needed.
  # Example:
  # - name: team-observability
